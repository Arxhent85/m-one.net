<!DOCTYPE html>
<html lang="de">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>M ONE</title>
  <meta name="description" content="Ihr Partner für Bau, Farben und Reinigung" />
  <script src="https://cdn.tailwindcss.com"></script>
  <link
    href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&display=swap"
    rel="stylesheet">
  <script>
    tailwind.config = {
      darkMode: 'class', // Enable class-based dark mode
      theme: {
        extend: {
          fontFamily: {
            sans: ['"DM Sans"', 'sans-serif'],
            display: ['"DM Sans"', 'sans-serif'],
          },
          colors: {
            primary: '#0a0a0a', // Neutral 950 (Almost Black)
            accent: '#f97316', // Orange 500
            light: '#fafafa', // Neutral 50 (Almost White)

            // Extended Brand Palette
            brand: {
              50: '#fafafa', // Neutral 50
              100: '#f5f5f5', // Neutral 100
              200: '#e5e5e5', // Neutral 200
              300: '#d4d4d4', // Neutral 300
              400: '#a3a3a3', // Neutral 400
              500: '#f97316', // Orange 500 (Base Orange)
              600: '#ea580c', // Orange 600
              700: '#c2410c', // Orange 700
              800: '#262626', // Neutral 800
              900: '#171717', // Neutral 900
              950: '#0a0a0a', // Neutral 950
            }
          },
          keyframes: {
            fadeInDown: {
              '0%': { opacity: '0', transform: 'translateY(-10px)' },
              '100%': { opacity: '1', transform: 'translateY(0)' },
            }
          },
          animation: {
            'fade-in-down': 'fadeInDown 0.3s ease-out',
          }
        }
      }
    }
  </script>
  <style>
    /* Smooth scrolling for anchor links */
    html {
      scroll-behavior: smooth;
    }

    .vertical-text {
      writing-mode: vertical-rl;
      text-orientation: mixed;
    }

    .glass-panel {
      background: rgba(255, 255, 255, 0.03);
      backdrop-filter: blur(16px) saturate(180%);
      -webkit-backdrop-filter: blur(16px) saturate(180%);
      border: 1px solid rgba(255, 255, 255, 0.1);
      box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.05);
    }

    .dark .glass-panel {
      background: rgba(10, 10, 10, 0.4);
      border: 1px solid rgba(255, 255, 255, 0.05);
    }

    .premium-transition {
      transition: all 0.5s cubic-bezier(0.25, 1, 0.5, 1);
    }

    .glass-card {
      background: rgba(255, 255, 255, 0.03);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 1.5rem;
      transition: all 0.5s cubic-bezier(0.25, 1, 0.5, 1);
    }

    .dark .glass-card {
      background: rgba(255, 255, 255, 0.01);
      border: 1px solid rgba(255, 255, 255, 0.05);
    }

    .glass-card:hover {
      box-shadow: 0 20px 40px -10px rgba(0, 0, 0, 0.1);
      transform: translateY(-4px) scale(1.01);
      border-color: rgba(249, 115, 22, 0.3);
    }
  </style>
  <script type="importmap">
{
  "imports": {
    "lucide-react": "https://esm.sh/lucide-react@0.378.0",
    "react": "https://esm.sh/react@18.2.0",
    "react/jsx-runtime": "https://esm.sh/react@18.2.0/jsx-runtime",
    "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
    "react-dom/": "https://esm.sh/react-dom@18.2.0/",
    "react/": "https://esm.sh/react@18.2.0/"
  }
}
</script>
  <link rel="stylesheet" href="/index.css">
</head>

<body
  class="bg-light text-neutral-800 dark:bg-neutral-950 dark:text-neutral-100 antialiased selection:bg-accent selection:text-white transition-colors duration-300">
  <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>

</html>
